name: Build & Release APK

on:
  push:
    branches: ['main']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > release.keystore
            echo "Keystore decoded successfully"
          else
            echo "No KEYSTORE_BASE64 secret configured, will build debug APK"
          fi

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f release.keystore ]; then
            echo "Building signed release APK..."
            ./gradlew assembleRelease
          else
            echo "No signing config found, building debug APK"
            ./gradlew assembleDebug
          fi

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's/[^0-9]//g')
          echo "name=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-build${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Find APK
        id: apk
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "name=163MusicPro-${{ steps.version.outputs.name }}.apk" >> $GITHUB_OUTPUT
          else
            echo "path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "name=163MusicPro-${{ steps.version.outputs.name }}-debug.apk" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "163MusicPro ${{ steps.version.outputs.name }}"
          body: |
            ## 163MusicPro ${{ steps.version.outputs.name }}

            自动构建发布版本。

            ### 安装说明
            1. 下载下方 APK 文件
            2. 传输到手表并安装
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
